name: Build & Release

# Produces native installers for Windows, macOS and Linux.
# - Push a tag like `v0.1.0` to cut a GitHub Release with the artifacts attached.
# - Or run manually (workflow_dispatch) to get the bundles as build artifacts.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04 # Linux: .deb, .rpm, .AppImage
          - platform: windows-latest # Windows: .msi (WiX), .exe (NSIS)
          - platform: macos-latest # macOS (Apple Silicon): .dmg, .app
            target: aarch64-apple-darwin
          - platform: macos-13 # macOS (Intel): .dmg, .app
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            build-essential pkg-config patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        with:
          args: ${{ matrix.target && format('--target {0}', matrix.target) || '' }}
          # On a tag push, create/update a GitHub Release with the bundles.
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && format('Harbor {0}', github.ref_name) || '' }}
          releaseDraft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # When run manually (no tag), surface the bundles as downloadable artifacts.
      - name: Upload bundles as artifacts
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: harbor-${{ matrix.platform }}${{ matrix.target && format('-{0}', matrix.target) || '' }}
          path: |
            src-tauri/target/**/release/bundle/**/*.AppImage
            src-tauri/target/**/release/bundle/**/*.deb
            src-tauri/target/**/release/bundle/**/*.rpm
            src-tauri/target/**/release/bundle/**/*.dmg
            src-tauri/target/**/release/bundle/**/*.msi
            src-tauri/target/**/release/bundle/**/*-setup.exe
          if-no-files-found: ignore
